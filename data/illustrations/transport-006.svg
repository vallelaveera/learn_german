<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes carMove {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-8px); }
      }
      @keyframes carMove2 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-5px); }
      }
      @keyframes carMove3 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-3px); }
      }
      .car1 { animation: carMove 2s infinite; }
      .car2 { animation: carMove2 2.5s infinite; }
      .car3 { animation: carMove3 3s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="160" fill="#F1EFE8"/>

  <!-- Road -->
  <rect x="0" y="70" width="200" height="50" fill="#888780"/>
  
  <!-- Road markings -->
  <line x1="0" y1="95" x2="200" y2="95" stroke="#FAC775" stroke-width="2" stroke-dasharray="10,10"/>

  <!-- Car 1 (front of traffic jam) -->
  <g class="car1">
    <rect x="10" y="75" width="25" height="15" fill="#378ADD" rx="2"/>
    <circle cx="16" cy="90" r="2.5" fill="#2C2C2A"/>
    <circle cx="28" cy="90" r="2.5" fill="#2C2C2A"/>
    <rect x="12" y="77" width="8" height="6" fill="#B5D4F4"/>
  </g>

  <!-- Car 2 -->
  <g class="car2">
    <rect x="40" y="78" width="25" height="15" fill="#534AB7" rx="2"/>
    <circle cx="46" cy="93" r="2.5" fill="#2C2C2A"/>
    <circle cx="58" cy="93" r="2.5" fill="#2C2C2A"/>
    <rect x="42" y="80" width="8" height="6" fill="#B5D4F4"/>
  </g>

  <!-- Car 3 -->
  <g class="car3">
    <rect x="70" y="80" width="25" height="15" fill="#378ADD" rx="2"/>
    <circle cx="76" cy="95" r="2.5" fill="#2C2C2A"/>
    <circle cx="88" cy="95" r="2.5" fill="#2C2C2A"/>
    <rect x="72" y="82" width="8" height="6" fill="#B5D4F4"/>
  </g>

  <!-- Car 4 -->
  <rect x="100" y="82" width="25" height="15" fill="#534AB7" rx="2"/>
  <circle cx="106" cy="97" r="2.5" fill="#2C2C2A"/>
  <circle cx="118" cy="97" r="2.5" fill="#2C2C2A"/>
  <rect x="102" y="84" width="8" height="6" fill="#B5D4F4"/>

  <!-- Maya standing by the road, frustrated -->
  <!-- Head -->
  <circle cx="145" cy="35" r="11" fill="#EEEDFE"/>
  
  <!-- Hair -->
  <path d="M 135 30 Q 135 25 145 23 Q 155 25 155 30" fill="#534AB7"/>
  
  <!-- Eyes -->
  <circle cx="140" cy="33" r="1.5" fill="#2C2C2A"/>
  <circle cx="150" cy="33" r="1.5" fill="#2C2C2A"/>
  
  <!-- Body (Purple outfit) -->
  <rect x="136" y="48" width="18" height="20" fill="#7F77DD" rx="2"/>
  
  <!-- Arms -->
  <rect x="125" y="52" width="11" height="5" fill="#EEEDFE" rx="2.5"/>
  <rect x="154" y="52" width="11" height="5" fill="#EEEDFE" rx="2.5"/>
  
  <!-- Legs -->
  <rect x="139" y="68" width="4" height="12" fill="#5F5E5A"/>
  <rect x="147" y="68" width="4" height="12" fill="#5F5E5A"/>
  
  <!-- Frustrated gesture - hand raised -->
  <circle cx="127" cy="50" r="2" fill="#EEEDFE"/>

  <!-- Traffic sign -->
  <rect x="180" y="40" width="12" height="20" fill="#C0DD97"/>
  <text x="186" y="55" font-size="8" fill="#1D9E75" text-anchor="middle" font-weight="bold">!</text>
</svg>