<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes ticketCheck {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(8px); }
      }
      @keyframes nod {
        0%, 100% { transform: rotateY(0deg); }
        25% { transform: rotateY(-5deg); }
        75% { transform: rotateY(5deg); }
      }
      .maya { animation: ticketCheck 2s ease-in-out infinite; }
      .ticket { animation: nod 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="#F1EFE8"/>
  
  <!-- Zone circles in background -->
  <circle cx="40" cy="50" r="25" fill="none" stroke="#C0DD97" stroke-width="2"/>
  <circle cx="120" cy="50" r="25" fill="none" stroke="#C0DD97" stroke-width="2"/>
  <circle cx="80" cy="110" r="25" fill="none" stroke="#C0DD97" stroke-width="2"/>
  
  <!-- Zone labels -->
  <text x="40" y="55" font-size="10" fill="#1D9E75" text-anchor="middle" font-weight="bold">Z1</text>
  <text x="120" y="55" font-size="10" fill="#1D9E75" text-anchor="middle" font-weight="bold">Z2</text>
  <text x="80" y="115" font-size="10" fill="#1D9E75" text-anchor="middle" font-weight="bold">Z3</text>
  
  <!-- Maya group -->
  <g class="maya">
    <!-- Head -->
    <circle cx="50" cy="100" r="11" fill="#FAC775"/>
    
    <!-- Hair -->
    <path d="M 45 92 Q 50 88 55 92" fill="#534AB7"/>
    
    <!-- Eyes -->
    <circle cx="48" cy="98" r="1.5" fill="#2C2C2A"/>
    <circle cx="52" cy="98" r="1.5" fill="#2C2C2A"/>
    
    <!-- Body (purple outfit) -->
    <rect x="45" y="112" width="10" height="14" fill="#7F77DD" rx="2"/>
    
    <!-- Arms -->
    <line x1="45" y1="116" x2="38" y2="120" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
    <line x1="55" y1="116" x2="62" y2="120" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="47" y1="126" x2="46" y2="135" stroke="#534AB7" stroke-width="2" stroke-linecap="round"/>
    <line x1="53" y1="126" x2="54" y2="135" stroke="#534AB7" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Ticket in Maya's hand -->
  <g class="ticket" transform="translate(62, 118)">
    <rect x="0" y="0" width="22" height="14" fill="#378ADD" rx="1"/>
    <rect x="1" y="1" width="20" height="12" fill="#B5D4F4" rx="1"/>
    
    <!-- Ticket stripes (zones) -->
    <rect x="2" y="2" width="18" height="2" fill="#1D9E75"/>
    <rect x="2" y="5" width="18" height="2" fill="#1D9E75"/>
    <rect x="2" y="8" width="18" height="2" fill="#1D9E75"/>
  </g>
  
  <!-- Checkmark -->
  <g transform="translate(155, 95)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
    <path d="M -3 0 L -0.5 2.5 L 3 -2" stroke="#1D9E75" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>