<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes busMove {
        0% { transform: translateX(-80px); }
        100% { transform: translateX(180px); }
      }
      @keyframes mayaWave {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      .bus {
        animation: busMove 4s infinite;
      }
      .maya {
        animation: mayaWave 1s infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="160" fill="#F1EFE8"/>

  <!-- Road -->
  <rect y="100" width="200" height="40" fill="#888780"/>
  <line x1="0" y1="120" x2="200" y2="120" stroke="#FAC775" stroke-width="2" stroke-dasharray="10,10"/>

  <!-- Bus Group -->
  <g class="bus">
    <!-- Bus body -->
    <rect x="10" y="70" width="50" height="35" fill="#378ADD" rx="4"/>
    
    <!-- Bus front -->
    <circle cx="58" cy="85" r="8" fill="#2C2C2A"/>
    
    <!-- Bus window 1 -->
    <rect x="15" y="75" width="12" height="12" fill="#B5D4F4"/>
    
    <!-- Bus window 2 -->
    <rect x="30" y="75" width="12" height="12" fill="#B5D4F4"/>
    
    <!-- Bus door -->
    <rect x="45" y="80" width="10" height="20" fill="#534AB7"/>
    
    <!-- Bus wheels -->
    <circle cx="22" cy="108" r="5" fill="#2C2C2A"/>
    <circle cx="48" cy="108" r="5" fill="#2C2C2A"/>
  </g>

  <!-- Maya Group -->
  <g class="maya" transform="translate(120, 50)">
    <!-- Head -->
    <circle cx="0" cy="0" r="11" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
    
    <!-- Hair -->
    <path d="M -8 -8 Q -10 -12 0 -13 Q 10 -12 8 -8" fill="#2C2C2A"/>
    
    <!-- Eyes -->
    <circle cx="-4" cy="-1" r="1.5" fill="#2C2C2A"/>
    <circle cx="4" cy="-1" r="1.5" fill="#2C2C2A"/>
    
    <!-- Smile -->
    <path d="M -3 2 Q 0 4 3 2" stroke="#2C2C2A" stroke-width="1" fill="none" stroke-linecap="round"/>
    
    <!-- Body -->
    <rect x="-8" y="12" width="16" height="18" fill="#7F77DD" rx="2"/>
    
    <!-- Arms -->
    <line x1="-8" y1="16" x2="-16" y2="14" stroke="#F1EFE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="16" y2="14" stroke="#F1EFE8" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="-4" y1="30" x2="-4" y2="40" stroke="#2C2C2A" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="30" x2="4" y2="40" stroke="#2C2C2A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Clock face indication -->
  <circle cx="160" cy="30" r="12" fill="none" stroke="#C0DD97" stroke-width="2"/>
  <line x1="160" y1="20" x2="160" y2="15" stroke="#C0DD97" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="30" x2="167" y2="30" stroke="#C0DD97" stroke-width="1.5" stroke-linecap="round"/>
</svg>