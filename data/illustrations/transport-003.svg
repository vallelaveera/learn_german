<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes ride {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(20px); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .subway { animation: ride 3s ease-in-out infinite; }
      .maya { animation: bounce 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="160" fill="#F1EFE8"/>

  <!-- Track/ground -->
  <rect y="120" width="200" height="40" fill="#888780"/>
  <line x1="0" y1="130" x2="200" y2="130" stroke="#5F5E5A" stroke-width="2"/>
  <line x1="0" y1="140" x2="200" y2="140" stroke="#5F5E5A" stroke-width="2"/>

  <!-- Subway train body -->
  <g class="subway">
    <!-- Main train car -->
    <rect x="20" y="85" width="60" height="35" fill="#378ADD" rx="3"/>
    
    <!-- Train windows -->
    <rect x="28" y="92" width="12" height="12" fill="#B5D4F4"/>
    <rect x="43" y="92" width="12" height="12" fill="#B5D4F4"/>
    <rect x="58" y="92" width="12" height="12" fill="#B5D4F4"/>
    
    <!-- Door -->
    <rect x="28" y="107" width="20" height="10" fill="#2C2C2A"/>
    <rect x="52" y="107" width="20" height="10" fill="#2C2C2A"/>
    
    <!-- Wheels -->
    <circle cx="32" cy="122" r="4" fill="#2C2C2A"/>
    <circle cx="68" cy="122" r="4" fill="#2C2C2A"/>
  </g>

  <!-- Maya inside train -->
  <g class="maya">
    <!-- Head -->
    <circle cx="50" cy="70" r="11" fill="#FAC775"/>
    
    <!-- Hair -->
    <path d="M 42 62 Q 50 58 58 62" stroke="#5F5E5A" stroke-width="2" fill="none"/>
    
    <!-- Eyes -->
    <circle cx="47" cy="68" r="1.5" fill="#2C2C2A"/>
    <circle cx="53" cy="68" r="1.5" fill="#2C2C2A"/>
    
    <!-- Body (purple outfit) -->
    <rect x="43" y="82" width="14" height="15" fill="#7F77DD" rx="2"/>
    
    <!-- Arms -->
    <rect x="38" y="85" width="5" height="8" fill="#FAC775" rx="2"/>
    <rect x="57" y="85" width="5" height="8" fill="#FAC775" rx="2"/>
    
    <!-- Legs -->
    <rect x="45" y="97" width="4" height="8" fill="#534AB7" rx="1"/>
    <rect x="51" y="97" width="4" height="8" fill="#534AB7" rx="1"/>
  </g>

  <!-- Station platform -->
  <rect x="120" y="110" width="70" height="50" fill="#C0DD97" rx="2"/>
  <text x="135" y="142" font-size="10" fill="#1D9E75" font-weight="bold">Station</text>
</svg>